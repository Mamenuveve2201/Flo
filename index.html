<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="manifest.json"/>
<title>Flo — Budget Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0a0f;
  --bg2:#111118;
  --bg3:#18181f;
  --bg4:#1e1e27;
  --border:#2a2a38;
  --border2:#333345;
  --text:#f0f0f5;
  --text2:#9090a8;
  --text3:#5a5a72;
  --green:#00e5a0;
  --green2:#00b880;
  --red:#ff4d6a;
  --red2:#cc2d47;
  --yellow:#f5c542;
  --blue:#4d90ff;
  --accent:#7b5ea7;
  --accent2:#9b7ec8;
  --mono:'DM Mono',monospace;
  --sans:'Syne',sans-serif;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:14px;display:flex;flex-direction:column}

/* AUTH */
#auth{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:0}
#auth.hidden{display:none}
.auth-logo{font-family:var(--sans);font-size:42px;font-weight:800;letter-spacing:-2px;margin-bottom:8px;background:linear-gradient(135deg,var(--green),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.auth-sub{color:var(--text3);font-size:12px;letter-spacing:3px;text-transform:uppercase;margin-bottom:40px}
.auth-tabs{display:flex;gap:0;margin-bottom:24px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.auth-tab{flex:1;padding:10px 20px;background:none;border:none;color:var(--text2);font-family:var(--mono);font-size:13px;cursor:pointer;transition:all .2s}
.auth-tab.active{background:var(--bg4);color:var(--text)}
.auth-form{width:100%;max-width:340px;display:flex;flex-direction:column;gap:10px}
.auth-form.hidden{display:none}
.auth-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:14px;padding:13px 16px;outline:none;transition:border-color .2s}
.auth-input:focus{border-color:var(--accent2)}
.auth-btn{width:100%;background:linear-gradient(135deg,var(--green2),var(--accent));border:none;border-radius:8px;color:#000;font-family:var(--sans);font-size:14px;font-weight:700;padding:14px;cursor:pointer;transition:opacity .2s;margin-top:4px}
.auth-btn:active{opacity:.8}
.auth-msg{font-size:12px;min-height:18px;text-align:center;margin-top:4px}
.auth-msg.err{color:var(--red)}
.auth-msg.ok{color:var(--green)}
.auth-link{color:var(--text3);font-size:12px;text-align:center;cursor:pointer;margin-top:8px}
.auth-link:hover{color:var(--accent2)}

/* APP SHELL */
#app{display:flex;flex-direction:column;height:100%;overflow:hidden}
#app.hidden{display:none}

/* HEADER */
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:52px;flex-shrink:0}
.logo{font-family:var(--sans);font-size:22px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,var(--green),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-actions{display:flex;align-items:center;gap:8px}
.icon-btn{background:none;border:none;color:var(--text2);cursor:pointer;padding:6px;border-radius:6px;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.icon-btn:hover{background:var(--bg4);color:var(--text)}

/* MONTH NAV */
.month-nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.month-nav-btn{background:none;border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}
.month-nav-btn:hover{border-color:var(--accent2);color:var(--accent2)}
.month-label{font-family:var(--sans);font-size:18px;font-weight:700;letter-spacing:-0.5px;color:var(--text)}
.month-sub{font-size:11px;color:var(--text3);text-align:center;margin-top:1px}

/* SUMMARY BAR */
.summary-bar{background:var(--bg3);border-bottom:1px solid var(--border);padding:10px 16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;flex-shrink:0}
.sum-box{text-align:center}
.sum-label{font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.sum-val{font-family:var(--mono);font-size:16px;font-weight:500}
.sum-val.green{color:var(--green)}
.sum-val.red{color:var(--red)}
.sum-val.yellow{color:var(--yellow)}

/* CONTENT */
#content{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 0 80px}
#content::-webkit-scrollbar{width:3px}
#content::-webkit-scrollbar-track{background:transparent}
#content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* SECTIONS */
.section{margin:16px 12px 0}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:0 4px}
.section-title{font-family:var(--sans);font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text2);display:flex;align-items:center;gap:6px}
.section-title .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-green{background:var(--green)}
.dot-red{background:var(--red)}
.dot-yellow{background:var(--yellow)}
.dot-blue{background:var(--blue)}
.add-btn{background:none;border:1px solid var(--border);color:var(--text3);padding:4px 10px;border-radius:20px;font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap}
.add-btn:hover{border-color:var(--green);color:var(--green)}

/* ROWS */
.row{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;transition:opacity .2s}
.row.paid-row{opacity:.5}
.check-btn{width:26px;height:26px;border-radius:50%;border:2px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s;color:transparent}
.check-btn.checked{background:var(--green);border-color:var(--green);color:#000}
.row-info{flex:1;min-width:0}
.row-name{font-size:14px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-name.paid-name{text-decoration:line-through;color:var(--text3)}
.row-meta{font-size:11px;color:var(--text3);margin-top:2px}
.row-amount{font-family:var(--mono);font-weight:500;flex-shrink:0}
.row-amount.out{color:var(--red)}
.row-amount.in{color:var(--green)}
.row-actions{display:flex;gap:4px;flex-shrink:0}
.row-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;border-radius:4px;font-size:13px;transition:all .15s}
.row-btn:hover{color:var(--text);background:var(--bg4)}

/* EMPTY */
.empty-row{text-align:center;padding:20px;color:var(--text3);font-size:12px;letter-spacing:1px}

/* BOTTOM NAV */
nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);z-index:50;flex-shrink:0}
.nav-btn{flex:1;background:none;border:none;color:var(--text3);cursor:pointer;padding:10px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:var(--mono);font-size:10px;transition:color .15s}
.nav-btn.active{color:var(--green)}
.nav-icon{font-size:18px}

/* MODAL OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.overlay.hidden{display:none}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:18px 18px 0 0;padding:20px 20px 32px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal-title{font-family:var(--sans);font-size:17px;font-weight:700;margin-bottom:18px;color:var(--text)}
.form-row{margin-bottom:12px}
.form-label{font-size:11px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.form-input{width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:14px;padding:11px 14px;outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--accent2)}
.form-select{width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:14px;padding:11px 14px;outline:none;appearance:none;cursor:pointer}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.btn-cancel{background:var(--bg4);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:12px;font-family:var(--mono);font-size:13px;cursor:pointer}
.btn-save{background:linear-gradient(135deg,var(--green2),var(--accent));border:none;color:#000;border-radius:8px;padding:12px;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer}
.btn-delete{background:var(--bg4);border:1px solid var(--red2);color:var(--red);border-radius:8px;padding:12px;font-family:var(--mono);font-size:13px;cursor:pointer;grid-column:1/-1}

/* RECURRING TOGGLE */
.recur-note{font-size:11px;color:var(--text3);margin-top:6px;line-height:1.5}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg4);border:1px solid var(--border);border-radius:8px;margin-bottom:12px;cursor:pointer}
.toggle-label{font-size:13px;color:var(--text2)}
.toggle{width:36px;height:20px;background:var(--border2);border-radius:10px;position:relative;transition:background .2s}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle.on::after{transform:translateX(16px)}

/* OVERVIEW TAB */
.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 12px 0}
.ov-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px}
.ov-card.full{grid-column:1/-1}
.ov-title{font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.ov-val{font-family:var(--mono);font-size:24px;font-weight:500}
.ov-sub{font-size:11px;color:var(--text3);margin-top:4px}
.progress-bar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:3px;transition:width .4s ease}
.cat-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)}
.cat-row:last-child{border-bottom:none}
.cat-name{font-size:13px;color:var(--text2)}
.cat-amt{font-family:var(--mono);font-size:13px;color:var(--red)}

/* RECURRING TAB */
.recur-section{margin:12px 12px 0}
.recur-row{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.recur-badge{font-size:10px;padding:2px 8px;border-radius:20px;letter-spacing:1px;text-transform:uppercase;flex-shrink:0}
.recur-badge.bill{background:rgba(255,77,106,.15);color:var(--red);border:1px solid rgba(255,77,106,.3)}
.recur-badge.sub{background:rgba(245,197,66,.15);color:var(--yellow);border:1px solid rgba(245,197,66,.3)}

/* SYNCING */
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-left:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border2);color:var(--text);font-size:13px;padding:10px 18px;border-radius:20px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* SETTINGS TAB */
.settings-section{margin:16px 12px 0}
.settings-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.settings-label{font-size:14px;color:var(--text)}
.settings-value{font-size:13px;color:var(--text3)}
.settings-btn{background:none;border:none;color:var(--text2);cursor:pointer;font-family:var(--mono);font-size:13px;padding:4px 12px;border:1px solid var(--border);border-radius:6px}
.settings-btn.danger{color:var(--red);border-color:var(--red2)}

/* CATEGORY PILLS */
.category-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.pill{padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--bg4);color:var(--text2);transition:all .15s}
.pill.selected{border-color:var(--accent2);background:rgba(155,126,200,.15);color:var(--accent2)}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="auth-logo">flo</div>
  <div class="auth-sub">budget tracker</div>
  <div class="auth-tabs">
    <button class="auth-tab active" onclick="authTab('in')">Sign In</button>
    <button class="auth-tab" onclick="authTab('up')">Create Account</button>
  </div>
  <div class="auth-form" id="form-in">
    <input class="auth-input" id="em-in" type="email" placeholder="email address" autocomplete="email"/>
    <input class="auth-input" id="pw-in" type="password" placeholder="password" autocomplete="current-password"/>
    <button class="auth-btn" onclick="doSignIn()">Sign In</button>
    <div class="auth-link" onclick="authTab('forgot')">Forgot password?</div>
  </div>
  <div class="auth-form hidden" id="form-up">
    <input class="auth-input" id="em-up" type="email" placeholder="email address" autocomplete="email"/>
    <input class="auth-input" id="pw-up" type="password" placeholder="password (min 6 chars)" autocomplete="new-password"/>
    <button class="auth-btn" onclick="doSignUp()">Create Account</button>
  </div>
  <div class="auth-form hidden" id="form-forgot">
    <div style="font-size:12px;color:var(--text3);margin-bottom:8px;text-align:center">We'll send a reset link to your email.</div>
    <input class="auth-input" id="em-forgot" type="email" placeholder="email address"/>
    <button class="auth-btn" onclick="doForgot()">Send Reset Link</button>
    <div class="auth-link" onclick="authTab('in')">← Back to sign in</div>
  </div>
  <div class="auth-msg" id="auth-msg"></div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header>
    <div class="logo">flo</div>
    <div class="header-actions">
      <span id="sync-indicator" style="font-size:11px;color:var(--text3)">●</span>
      <button class="icon-btn" onclick="doSignOut()" title="Sign out">⏻</button>
    </div>
  </header>

  <!-- Month nav -->
  <div class="month-nav">
    <button class="month-nav-btn" onclick="changeMonth(-1)">‹</button>
    <div style="text-align:center">
      <div class="month-label" id="month-label">March 2026</div>
      <div class="month-sub" id="month-sub">loading...</div>
    </div>
    <button class="month-nav-btn" onclick="changeMonth(1)">›</button>
  </div>

  <!-- Summary bar -->
  <div class="summary-bar">
    <div class="sum-box">
      <div class="sum-label">Income</div>
      <div class="sum-val green" id="sum-in">$0</div>
    </div>
    <div class="sum-box">
      <div class="sum-label">Out</div>
      <div class="sum-val red" id="sum-out">$0</div>
    </div>
    <div class="sum-box">
      <div class="sum-label">Balance</div>
      <div class="sum-val yellow" id="sum-bal">$0</div>
    </div>
  </div>

  <!-- Content area -->
  <div id="content">
    <!-- Rendered by JS based on active tab -->
  </div>

  <!-- Bottom nav -->
  <nav>
    <button class="nav-btn active" data-tab="month" onclick="setTab('month')">
      <span class="nav-icon">≡</span>Month
    </button>
    <button class="nav-btn" data-tab="overview" onclick="setTab('overview')">
      <span class="nav-icon">◎</span>Overview
    </button>
    <button class="nav-btn" data-tab="recurring" onclick="setTab('recurring')">
      <span class="nav-icon">↻</span>Templates
    </button>
    <button class="nav-btn" data-tab="settings" onclick="setTab('settings')">
      <span class="nav-icon">⚙</span>Settings
    </button>
  </nav>
</div>

<!-- Modal overlay -->
<div class="overlay hidden" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ═══════════════════════════════════════════
// SUPABASE SETUP
// ═══════════════════════════════════════════
const SB = supabase.createClient(
  'https://uvqjswdfcixwktgvnzbq.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2cWpzd2RmY2l4d2t0Z3ZuemJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDExMzEsImV4cCI6MjA4NzkxNzEzMX0.SMB9fnxmLHFNTNkJk47UFpMqlccv_wvJOYAicvGxqoI'
);

// ═══════════════════════════════════════════
// DATA MODEL
// Everything is per-month. Key = "YYYY-MM"
//
// D = {
//   months: {
//     "2026-03": {
//       income: [{ id, name, amount, note, category }],
//       bills: [{ id, name, amount, category, dueDay, paid, note, skipped }],
//       subs: [{ id, name, amount, cycle, category, paid, note }]
//     }
//   },
//   templates: {   // recurring bill/sub templates
//     bills: [{ id, name, amount, category, dueDay, note, active }],
//     subs: [{ id, name, amount, cycle, category, note, active }]
//   },
//   currency: 'USD'
// }
// ═══════════════════════════════════════════
let ME = null;
let D = { months: {}, templates: { bills: [], subs: [] }, currency: 'USD' };
let currentMonthOffset = 0; // 0 = current month
let activeTab = 'month';
let syncTimer = null;

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function getMonthKey(offset) {
  const d = new Date();
  d.setDate(1);
  d.setMonth(d.getMonth() + offset);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}

function getMonthLabel(offset) {
  const d = new Date();
  d.setDate(1);
  d.setMonth(d.getMonth() + offset);
  return d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}

function fmt(n) {
  const num = parseFloat(n) || 0;
  const abs = Math.abs(num);
  const str = abs.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return '$' + str;
}

function ensureMonth(key) {
  if (!D.months[key]) {
    D.months[key] = { income: [], bills: [], subs: [] };
    // Copy active templates into this month
    if (D.templates.bills) {
      D.templates.bills.filter(t=>t.active!==false).forEach(t => {
        D.months[key].bills.push({ id: uid(), name: t.name, amount: t.amount, category: t.category, dueDay: t.dueDay, paid: false, skipped: false, note: t.note||'', templateId: t.id });
      });
    }
    if (D.templates.subs) {
      D.templates.subs.filter(t=>t.active!==false).forEach(t => {
        D.months[key].subs.push({ id: uid(), name: t.name, amount: t.amount, cycle: t.cycle, category: t.category, paid: false, note: t.note||'', templateId: t.id });
      });
    }
  }
  return D.months[key];
}

function getCurrentMonth() {
  const key = getMonthKey(currentMonthOffset);
  return ensureMonth(key);
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════════
// CLOUD SYNC
// ═══════════════════════════════════════════
function setSyncStatus(status) {
  const el = document.getElementById('sync-indicator');
  if (!el) return;
  if (status === 'syncing') { el.textContent = '↻'; el.style.color = 'var(--yellow)'; }
  else if (status === 'ok') { el.textContent = '●'; el.style.color = 'var(--green)'; }
  else { el.textContent = '●'; el.style.color = 'var(--red)'; }
}

async function pullCloud() {
  if (!ME) return;
  setSyncStatus('syncing');
  try {
    const { data, error } = await SB.from('user_data').select('data').eq('id', ME.id).single();
    if (error && error.code !== 'PGRST116') throw error;
    if (data && data.data && data.data.months) {
      D = data.data;
      if (!D.templates) D.templates = { bills: [], subs: [] };
      if (!D.templates.bills) D.templates.bills = [];
      if (!D.templates.subs) D.templates.subs = [];
    }
    setSyncStatus('ok');
    saveLocal();
    renderAll();
  } catch(e) {
    setSyncStatus('err');
    console.error('pullCloud', e);
  }
}

async function pushCloud() {
  if (!ME) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(async () => {
    setSyncStatus('syncing');
    try {
      const { error } = await SB.from('user_data').upsert({ id: ME.id, data: D }, { onConflict: 'id' });
      if (error) throw error;
      setSyncStatus('ok');
    } catch(e) {
      setSyncStatus('err');
      console.error('pushCloud', e);
    }
  }, 800);
}

function saveLocal() {
  try { localStorage.setItem('flo_data', JSON.stringify(D)); } catch(e) {}
}

function loadLocal() {
  try {
    const s = localStorage.getItem('flo_data');
    if (s) {
      const parsed = JSON.parse(s);
      if (parsed.months) D = parsed;
      if (!D.templates) D.templates = { bills: [], subs: [] };
    }
  } catch(e) {}
}

function onChange() {
  saveLocal();
  pushCloud();
  renderAll();
}

// AUTH
// ═══════════════════════════════════════════
function authTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='in')||(i===1&&tab==='up')));
  document.getElementById('form-in').classList.toggle('hidden', tab!=='in');
  document.getElementById('form-up').classList.toggle('hidden', tab!=='up');
  document.getElementById('form-forgot').classList.toggle('hidden', tab!=='forgot');
  document.getElementById('auth-msg').textContent = '';
}

function setAuthMsg(msg, type) {
  const el = document.getElementById('auth-msg');
  el.textContent = msg;
  el.className = 'auth-msg' + (type ? ' '+type : '');
}

async function doSignIn() {
  const em = document.getElementById('em-in').value.trim();
  const pw = document.getElementById('pw-in').value;
  if (!em || !pw) { setAuthMsg('Enter email and password', 'err'); return; }
  setAuthMsg('Signing in...', '');
  const { error } = await SB.auth.signInWithPassword({ email: em, password: pw });
  if (error) { setAuthMsg(error.message, 'err'); }
}

async function doSignUp() {
  const em = document.getElementById('em-up').value.trim();
  const pw = document.getElementById('pw-up').value;
  if (!em || !pw) { setAuthMsg('Enter email and password', 'err'); return; }
  if (pw.length < 6) { setAuthMsg('Password must be at least 6 characters', 'err'); return; }
  setAuthMsg('Creating account...', '');
  const { error } = await SB.auth.signUp({ email: em, password: pw });
  if (error) { setAuthMsg(error.message, 'err'); }
  else { setAuthMsg('✓ Account created! Check your email to confirm.', 'ok'); }
}

async function doForgot() {
  const em = document.getElementById('em-forgot').value.trim();
  if (!em) { setAuthMsg('Enter your email', 'err'); return; }
  const { error } = await SB.auth.resetPasswordForEmail(em);
  if (error) { setAuthMsg(error.message, 'err'); }
  else { setAuthMsg('✓ Reset link sent! Check your email.', 'ok'); }
}

async function doSignOut() {
  await SB.auth.signOut();
  ME = null; D = { months: {}, templates: { bills: [], subs: [] }, currency: 'USD' };
  localStorage.removeItem('flo_data');
  document.getElementById('auth').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
}

function showApp() {
  document.getElementById('auth').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
}

function renderAll() {
  const key = getMonthKey(currentMonthOffset);
  const month = ensureMonth(key);
  const label = getMonthLabel(currentMonthOffset);

  // Month label
  document.getElementById('month-label').textContent = label;

  // Calc totals
  const totalIn = month.income.reduce((s,i) => s + (parseFloat(i.amount)||0), 0);
  const totalBills = month.bills.filter(b=>!b.skipped).reduce((s,b) => s + (parseFloat(b.amount)||0), 0);
  const totalSubs = month.subs.filter(s=>!s.skipped).reduce((s,b) => s + (parseFloat(b.amount)||0), 0);
  const totalOut = totalBills + totalSubs;
  const balance = totalIn - totalOut;
  const paidBills = month.bills.filter(b=>b.paid&&!b.skipped).reduce((s,b)=>s+(parseFloat(b.amount)||0),0);
  const paidSubs = month.subs.filter(b=>b.paid&&!b.skipped).reduce((s,b)=>s+(parseFloat(b.amount)||0),0);
  const totalPaid = paidBills + paidSubs;
  const remaining = totalOut - totalPaid;

  document.getElementById('sum-in').textContent = fmt(totalIn);
  document.getElementById('sum-out').textContent = fmt(totalOut);
  const balEl = document.getElementById('sum-bal');
  balEl.textContent = fmt(balance);
  balEl.className = 'sum-val ' + (balance >= 0 ? 'green' : 'red');

  const pct = totalOut > 0 ? Math.round((totalPaid/totalOut)*100) : 0;
  document.getElementById('month-sub').textContent = pct + '% of bills paid · ' + fmt(remaining) + ' remaining';

  // Render active tab
  const content = document.getElementById('content');
  if (activeTab === 'month') content.innerHTML = renderMonthTab(month, key);
  else if (activeTab === 'overview') content.innerHTML = renderOverviewTab(month, totalIn, totalOut, balance, totalPaid);
  else if (activeTab === 'recurring') content.innerHTML = renderRecurringTab();
  else if (activeTab === 'settings') content.innerHTML = renderSettingsTab();
}

function renderMonthTab(month, key) {
  let html = '';

  // INCOME
  html += `<div class="section">
    <div class="section-header">
      <div class="section-title"><span class="dot dot-green"></span>Income</div>
      <button class="add-btn" onclick="openModal('income','new','${key}')">+ Add</button>
    </div>`;
  if (!month.income.length) {
    html += `<div class="empty-row">No income entries yet</div>`;
  } else {
    month.income.forEach(item => {
      html += `<div class="row">
        <div class="row-info">
          <div class="row-name">${item.name}</div>
          <div class="row-meta">${item.category||'—'}${item.note ? ' · '+item.note : ''}</div>
        </div>
        <div class="row-amount in">${fmt(item.amount)}</div>
        <div class="row-actions">
          <button class="row-btn" onclick="openModal('income','edit','${key}','${item.id}')">✎</button>
          <button class="row-btn" onclick="deleteItem('income','${key}','${item.id}')">✕</button>
        </div>
      </div>`;
    });
  }
  html += '</div>';

  // BILLS
  html += `<div class="section">
    <div class="section-header">
      <div class="section-title"><span class="dot dot-red"></span>Bills</div>
      <button class="add-btn" onclick="openModal('bill','new','${key}')">+ Add</button>
    </div>`;
  const activeBills = month.bills.filter(b => !b.skipped);
  if (!activeBills.length) {
    html += `<div class="empty-row">No bills this month</div>`;
  } else {
    activeBills.sort((a,b) => (a.dueDay||31)-(b.dueDay||31)).forEach(bill => {
      const paid = !!bill.paid;
      html += `<div class="row${paid?' paid-row':''}">
        <button class="check-btn${paid?' checked':''}" onclick="togglePaid('bill','${key}','${bill.id}')">${paid?'✓':''}</button>
        <div class="row-info">
          <div class="row-name${paid?' paid-name':''}">${bill.name}</div>
          <div class="row-meta">${bill.category||'—'}${bill.dueDay?' · due '+bill.dueDay+'th':''}${bill.note?' · '+bill.note:''}</div>
        </div>
        <div class="row-amount out">${fmt(bill.amount)}</div>
        <div class="row-actions">
          <button class="row-btn" onclick="openModal('bill','edit','${key}','${bill.id}')">✎</button>
          <button class="row-btn" onclick="skipBill('${key}','${bill.id}')">✕</button>
        </div>
      </div>`;
    });
  }
  const skipped = month.bills.filter(b=>b.skipped);
  if (skipped.length) {
    html += `<div style="font-size:11px;color:var(--text3);padding:4px 4px 8px;text-align:center;cursor:pointer" onclick="unskipAll('${key}')">
      ${skipped.length} bill${skipped.length>1?'s':''} skipped this month — tap to restore
    </div>`;
  }
  html += '</div>';

  // SUBSCRIPTIONS
  html += `<div class="section" style="margin-bottom:8px">
    <div class="section-header">
      <div class="section-title"><span class="dot dot-yellow"></span>Subscriptions</div>
      <button class="add-btn" onclick="openModal('sub','new','${key}')">+ Add</button>
    </div>`;
  const activeSubs = month.subs.filter(s => !s.skipped);
  if (!activeSubs.length) {
    html += `<div class="empty-row">No subscriptions this month</div>`;
  } else {
    activeSubs.forEach(sub => {
      const paid = !!sub.paid;
      html += `<div class="row${paid?' paid-row':''}">
        <button class="check-btn${paid?' checked':''}" onclick="togglePaid('sub','${key}','${sub.id}')">${paid?'✓':''}</button>
        <div class="row-info">
          <div class="row-name${paid?' paid-name':''}">${sub.name}</div>
          <div class="row-meta">${sub.category||'—'} · ${sub.cycle||'monthly'}${sub.note?' · '+sub.note:''}</div>
        </div>
        <div class="row-amount out">${fmt(sub.amount)}</div>
        <div class="row-actions">
          <button class="row-btn" onclick="openModal('sub','edit','${key}','${sub.id}')">✎</button>
          <button class="row-btn" onclick="deleteItem('sub','${key}','${sub.id}')">✕</button>
        </div>
      </div>`;
    });
  }
  html += '</div>';

  return html;
}

function renderOverviewTab(month, totalIn, totalOut, balance, totalPaid) {
  const pct = totalOut > 0 ? Math.min(100, Math.round((totalOut/Math.max(totalIn,1))*100)) : 0;
  const paidPct = totalOut > 0 ? Math.min(100, Math.round((totalPaid/totalOut)*100)) : 0;

  // Category breakdown
  const cats = {};
  month.bills.filter(b=>!b.skipped).forEach(b => {
    const c = b.category||'Other';
    cats[c] = (cats[c]||0) + (parseFloat(b.amount)||0);
  });
  month.subs.filter(s=>!s.skipped).forEach(s => {
    const c = s.category||'Other';
    cats[c] = (cats[c]||0) + (parseFloat(s.amount)||0);
  });

  const catRows = Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([c,v]) =>
    `<div class="cat-row"><span class="cat-name">${c}</span><span class="cat-amt">${fmt(v)}</span></div>`
  ).join('');

  return `<div class="overview-grid">
    <div class="ov-card">
      <div class="ov-title">Total Income</div>
      <div class="ov-val" style="color:var(--green)">${fmt(totalIn)}</div>
    </div>
    <div class="ov-card">
      <div class="ov-title">Total Out</div>
      <div class="ov-val" style="color:var(--red)">${fmt(totalOut)}</div>
    </div>
    <div class="ov-card full">
      <div class="ov-title">Balance</div>
      <div class="ov-val" style="color:${balance>=0?'var(--green)':'var(--red)'}">${fmt(balance)}</div>
      <div class="ov-sub">${balance>=0?'surplus':'deficit'} · ${pct}% of income used</div>
      <div class="progress-bar" style="margin-top:10px">
        <div class="progress-fill" style="width:${pct}%;background:${pct>90?'var(--red)':pct>70?'var(--yellow)':'var(--green)'}"></div>
      </div>
    </div>
    <div class="ov-card full">
      <div class="ov-title">Bills Paid</div>
      <div class="ov-val" style="color:var(--green)">${fmt(totalPaid)} <span style="font-size:16px;color:var(--text3)">/ ${fmt(totalOut)}</span></div>
      <div class="ov-sub">${paidPct}% of bills marked paid</div>
      <div class="progress-bar" style="margin-top:10px">
        <div class="progress-fill" style="width:${paidPct}%;background:var(--green)"></div>
      </div>
    </div>
    ${catRows ? `<div class="ov-card full">
      <div class="ov-title">By Category</div>
      ${catRows}
    </div>` : ''}
  </div>`;
}

// ═══════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════
function togglePaid(type, key, id) {
  const arr = type === 'bill' ? D.months[key].bills : D.months[key].subs;
  const item = arr.find(x => x.id === id);
  if (item) { item.paid = !item.paid; onChange(); }
}

function skipBill(key, id) {
  const bill = D.months[key].bills.find(b => b.id === id);
  if (!bill) return;
  if (!confirm('Skip "' + bill.name + '" for ' + getMonthLabel(currentMonthOffset) + ' only?\n\nThis month only — it will not affect other months or the template.')) return;
  bill.skipped = true;
  onChange();
  toast('Bill skipped for this month');
}

function unskipAll(key) {
  D.months[key].bills.forEach(b => b.skipped = false);
  onChange();
  toast('Bills restored');
}

function deleteItem(type, key, id) {
  const arr = type === 'income' ? D.months[key].income : D.months[key].subs;
  const idx = arr.findIndex(x => x.id === id);
  if (idx === -1) return;
  if (!confirm('Delete "' + arr[idx].name + '"?\n\nThis only affects ' + getMonthLabel(currentMonthOffset) + '.')) return;
  arr.splice(idx, 1);
  onChange();
}

function deleteTpl(type, id) {
  const arr = type === 'bill' ? D.templates.bills : D.templates.subs;
  const idx = arr.findIndex(x => x.id === id);
  if (idx === -1) return;
  if (!confirm('Delete template "' + arr[idx].name + '"?\n\nThis will not affect existing months — only future months.')) return;
  arr.splice(idx, 1);
  onChange();
  toast('Template deleted');
}

      <div class="form-row"><div class="form-label">Name</div>
        <input class="form-input" id="f-name" value="${item.name}" placeholder="e.g. Netflix, Spotify"/></div>
      <div class="form-row-2">
        <div class="form-row" style="margin:0"><div class="form-label">Amount</div>
          <input class="form-input" id="f-amt" type="number" step="0.01" value="${item.amount}" placeholder="0.00"/></div>
        <div class="form-row" style="margin:0"><div class="form-label">Cycle</div>
          <select class="form-select" id="f-cycle">
            <option value="monthly"${item.cycle==='monthly'?' selected':''}>Monthly</option>
            <option value="yearly"${item.cycle==='yearly'?' selected':''}>Yearly</option>
            <option value="weekly"${item.cycle==='weekly'?' selected':''}>Weekly</option>
          </select></div>
      </div>
      <div class="form-row"><div class="form-label">Category</div>
        <div class="category-pills">
          ${EXPENSE_CATS.map(c=>`<span class="pill${item.category===c?' selected':''}" onclick="selectPill(this,'f-cat','${c}')">${c}</span>`).join('')}
        </div>
        <input type="hidden" id="f-cat" value="${item.category||'Streaming'}"/>
      </div>
      <div class="form-row"><div class="form-label">Note (optional)</div>
        <input class="form-input" id="f-note" value="${item.note||''}" placeholder="any notes..."/></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveSub('${mode}','${key}','${item.id}')">Save</button>
        ${mode==='edit'?`<button class="btn-delete" onclick="deleteItem('sub','${key}','${item.id}');closeModal()">Delete this month</button>`:''}
      </div>`;
  }

  else if (type === 'tpl-bill') {
    let item = { id: uid(), name: '', amount: '', category: 'Housing', dueDay: '', note: '', active: true };
    if (mode === 'edit') {
      const found = D.templates.bills.find(x=>x.id===id);
      if (found) item = {...found};
    }
    html = `<div class="modal-title">${mode==='edit'?'Edit':'New'} Bill Template</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:14px">Added to every new month automatically.</div>
      <div class="form-row"><div class="form-label">Bill name</div>
        <input class="form-input" id="f-name" value="${item.name}" placeholder="e.g. Rent, Electric"/></div>
      <div class="form-row-2">
        <div class="form-row" style="margin:0"><div class="form-label">Amount</div>
          <input class="form-input" id="f-amt" type="number" step="0.01" value="${item.amount}" placeholder="0.00"/></div>
        <div class="form-row" style="margin:0"><div class="form-label">Due day</div>
          <input class="form-input" id="f-due" type="number" min="1" max="31" value="${item.dueDay||''}" placeholder="e.g. 1"/></div>
      </div>
      <div class="form-row"><div class="form-label">Category</div>
        <div class="category-pills">
          ${EXPENSE_CATS.map(c=>`<span class="pill${item.category===c?' selected':''}" onclick="selectPill(this,'f-cat','${c}')">${c}</span>`).join('')}
        </div>
        <input type="hidden" id="f-cat" value="${item.category||'Housing'}"/>
      </div>
      <div class="form-row"><div class="form-label">Note (optional)</div>
        <input class="form-input" id="f-note" value="${item.note||''}" placeholder="any notes..."/></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveTplBill('${mode}','${item.id}')">Save Template</button>
        ${mode==='edit'?`<button class="btn-delete" onclick="deleteTpl('bill','${item.id}');closeModal()">Delete Template</button>`:''}
      </div>`;
  }

  else if (type === 'tpl-sub') {
    let item = { id: uid(), name: '', amount: '', category: 'Streaming', cycle: 'monthly', note: '', active: true };
    if (mode === 'edit') {
      const found = D.templates.subs.find(x=>x.id===id);
      if (found) item = {...found};
    }
    html = `<div class="modal-title">${mode==='edit'?'Edit':'New'} Subscription Template</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:14px">Added to every new month automatically.</div>
      <div class="form-row"><div class="form-label">Name</div>
        <input class="form-input" id="f-name" value="${item.name}" placeholder="e.g. Netflix, Spotify"/></div>
      <div class="form-row-2">
        <div class="form-row" style="margin:0"><div class="form-label">Amount</div>
          <input class="form-input" id="f-amt" type="number" step="0.01" value="${item.amount}" placeholder="0.00"/></div>
        <div class="form-row" style="margin:0"><div class="form-label">Cycle</div>
          <select class="form-select" id="f-cycle">
            <option value="monthly"${item.cycle==='monthly'?' selected':''}>Monthly</option>
            <option value="yearly"${item.cycle==='yearly'?' selected':''}>Yearly</option>
            <option value="weekly"${item.cycle==='weekly'?' selected':''}>Weekly</option>
          </select></div>
      </div>
      <div class="form-row"><div class="form-label">Category</div>
        <div class="category-pills">
          ${EXPENSE_CATS.map(c=>`<span class="pill${item.category===c?' selected':''}" onclick="selectPill(this,'f-cat','${c}')">${c}</span>`).join('')}
        </div>
        <input type="hidden" id="f-cat" value="${item.category||'Streaming'}"/>
      </div>
      <div class="form-row"><div class="form-label">Note (optional)</div>
        <input class="form-input" id="f-note" value="${item.note||''}" placeholder="any notes..."/></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveTplSub('${mode}','${item.id}')">Save Template</button>
        ${mode==='edit'?`<button class="btn-delete" onclick="deleteTpl('sub','${item.id}');closeModal()">Delete Template</button>`:''}
      </div>`;
  }

  content.innerHTML = html;
  overlay.classList.remove('hidden');
  setTimeout(() => { const inp = content.querySelector('input:not([type=hidden])'); if (inp) inp.focus(); }, 100);
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.add('hidden');
}

function selectPill(el, inputId, val) {
  el.closest('.category-pills').querySelectorAll('.pill').forEach(p => p.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById(inputId).value = val;
}

// Save functions
function saveIncome(mode, key, id) {
  const name = document.getElementById('f-name').value.trim();
  const amount = parseFloat(document.getElementById('f-amt').value) || 0;
  const category = document.getElementById('f-cat').value;
  const note = document.getElementById('f-note').value.trim();
  if (!name) { toast('Enter a name'); return; }
  const month = ensureMonth(key);
  if (mode === 'edit') {
    const item = month.income.find(x=>x.id===id);
    if (item) { item.name=name; item.amount=amount; item.category=category; item.note=note; }
  } else {
    month.income.push({ id, name, amount, category, note });
  }
  closeModal();
  onChange();
  toast(mode==='edit'?'Income updated':'Income added');
}

function saveBill(mode, key, id) {
  const name = document.getElementById('f-name').value.trim();
  const amount = parseFloat(document.getElementById('f-amt').value) || 0;
  const category = document.getElementById('f-cat').value;
  const dueDay = parseInt(document.getElementById('f-due').value) || null;
  const note = document.getElementById('f-note').value.trim();
  if (!name) { toast('Enter a bill name'); return; }
  const month = ensureMonth(key);
  if (mode === 'edit') {
    const item = month.bills.find(x=>x.id===id);
    if (item) { item.name=name; item.amount=amount; item.category=category; item.dueDay=dueDay; item.note=note; }
  } else {
    month.bills.push({ id, name, amount, category, dueDay, paid: false, skipped: false, note });
  }
  closeModal();
  onChange();
  toast(mode==='edit'?'Bill updated':'Bill added');
}

function saveSub(mode, key, id) {
  const name = document.getElementById('f-name').value.trim();
  const amount = parseFloat(document.getElementById('f-amt').value) || 0;
  const category = document.getElementById('f-cat').value;
  const cycle = document.getElementById('f-cycle').value;
  const note = document.getElementById('f-note').value.trim();
  if (!name) { toast('Enter a name'); return; }
  const month = ensureMonth(key);
  if (mode === 'edit') {
    const item = month.subs.find(x=>x.id===id);
    if (item) { item.name=name; item.amount=amount; item.category=category; item.cycle=cycle; item.note=note; }
  } else {
    month.subs.push({ id, name, amount, category, cycle, paid: false, note });
  }
  closeModal();
  onChange();
  toast(mode==='edit'?'Subscription updated':'Subscription added');
}

function saveTplBill(mode, id) {
  const name = document.getElementById('f-name').value.trim();
  const amount = parseFloat(document.getElementById('f-amt').value) || 0;
  const category = document.getElementById('f-cat').value;
  const dueDay = parseInt(document.getElementById('f-due').value) || null;
  const note = document.getElementById('f-note').value.trim();
  if (!name) { toast('Enter a bill name'); return; }
  if (!D.templates.bills) D.templates.bills = [];
  if (mode === 'edit') {
    const item = D.templates.bills.find(x=>x.id===id);
    if (item) { item.name=name; item.amount=amount; item.category=category; item.dueDay=dueDay; item.note=note; }
  } else {
    D.templates.bills.push({ id, name, amount, category, dueDay, note, active: true });
  }
  closeModal();
  onChange();
  toast('Template saved');
}

function saveTplSub(mode, id) {
  const name = document.getElementById('f-name').value.trim();
  const amount = parseFloat(document.getElementById('f-amt').value) || 0;
  const category = document.getElementById('f-cat').value;
  const cycle = document.getElementById('f-cycle').value;
  const note = document.getElementById('f-note').value.trim();
  if (!name) { toast('Enter a name'); return; }
  if (!D.templates.subs) D.templates.subs = [];
  if (mode === 'edit') {
    const item = D.templates.subs.find(x=>x.id===id);
    if (item) { item.name=name; item.amount=amount; item.category=category; item.cycle=cycle; item.note=note; }
  } else {
    D.templates.subs.push({ id, name, amount, category, cycle, note, active: true });
  }
  closeModal();
  onChange();
  toast('Template saved');
}

// BOOT
// ═══════════════════════════════════════════
loadLocal();

SB.auth.getSession().then(function(res) {
  if (res.data && res.data.session) {
    ME = res.data.session.user;
    showApp();
    pullCloud();
  } else {
    document.getElementById('auth').classList.remove('hidden');
  }
});

SB.auth.onAuthStateChange(function(event, session) {
  if (event === 'SIGNED_IN') {
    ME = session.user;
    showApp();
    pullCloud();
  } else if (event === 'SIGNED_OUT') {
    ME = null;
    document.getElementById('auth').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
  }
});

// SW registration
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/Flo/sw.js', { scope: '/Flo/' })
      .catch(function(e) { console.log('SW:', e); });
  });
}
